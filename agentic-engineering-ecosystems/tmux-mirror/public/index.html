<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tmux-mirror</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #1a1a1a; color: #e0e0e0; font-family: system-ui, sans-serif; font-size: 13px; }

  #layout { display: flex; height: 100vh; }

  #sidebar {
    width: 200px;
    flex-shrink: 0;
    background: #111;
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 12px 12px 8px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #666;
    border-bottom: 1px solid #2a2a2a;
  }

  #session-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }

  .session-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 4px;
    margin: 1px 6px;
    gap: 8px;
  }
  .session-item:hover { background: #2a2a2a; }
  .session-item.active { background: #1e3a5f; color: #7ab8f5; }

  .session-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .kill-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 3px;
  }
  .kill-btn:hover { background: #3a1a1a; color: #e05555; }

  #sidebar-footer {
    padding: 10px;
    border-top: 1px solid #2a2a2a;
  }

  #new-session-btn {
    width: 100%;
    padding: 7px;
    background: #1e3a5f;
    color: #7ab8f5;
    border: 1px solid #2a5a9f;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  #new-session-btn:hover { background: #254a7a; }

  #terminal-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #0d0d0d;
  }

  #terminal-header {
    padding: 6px 12px;
    font-size: 11px;
    color: #555;
    border-bottom: 1px solid #1e1e1e;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #terminal-container {
    flex: 1;
    padding: 4px;
    overflow: hidden;
    position: relative;
  }

  #no-session-msg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #444;
    font-size: 14px;
    pointer-events: none;
  }

  /* Modal */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }

  #modal {
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 24px;
    width: 340px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  #modal h3 { font-size: 14px; font-weight: 600; color: #e0e0e0; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: #888; }
  .field input {
    padding: 7px 10px;
    background: #111;
    border: 1px solid #333;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 13px;
    font-family: monospace;
  }
  .field input:focus { outline: none; border-color: #4a7abf; }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  .btn {
    padding: 7px 14px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-size: 12px;
  }
  .btn-primary { background: #1e3a5f; color: #7ab8f5; border: 1px solid #2a5a9f; }
  .btn-primary:hover { background: #254a7a; }
  .btn-ghost { background: transparent; color: #666; border: 1px solid #333; }
  .btn-ghost:hover { color: #aaa; }

  #no-session-msg {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #444;
    font-size: 14px;
  }
</style>
</head>
<body>

<div id="layout">
  <div id="sidebar">
    <div id="sidebar-header">Sessions</div>
    <div id="session-list"></div>
    <div id="sidebar-footer">
      <button id="new-session-btn" onclick="openModal()">+ New Session</button>
    </div>
  </div>

  <div id="terminal-pane">
    <div id="terminal-header">tmux-mirror</div>
    <div style="position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div id="no-session-msg">Select or create a session</div>
      <div id="terminal-container"></div>
    </div>
  </div>
</div>

<!-- New Session Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h3>New Session</h3>
    <div class="field">
      <label>Session name (no spaces)</label>
      <input id="modal-name" type="text" placeholder="e.g. claude" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
      <label>Command (optional)</label>
      <input id="modal-cmd" type="text" placeholder="e.g. claude" autocomplete="off" spellcheck="false">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createSession()">Create</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script>

let currentSession = null;
let term = null;
let fitAddon = null;
let ws = null;
let resizeObserver = null;

// --- Terminal setup ---

function initTerminal() {
  const container = document.getElementById('terminal-container');
  container.innerHTML = '';

  if (resizeObserver) { resizeObserver.disconnect(); resizeObserver = null; }
  if (term) { try { term.dispose(); } catch {} term = null; }
  if (ws) { try { ws.close(); } catch {} ws = null; }

  term = new Terminal({
    cursorBlink: true,
    scrollback: 5000,
    fontFamily: 'Menlo, "DejaVu Sans Mono", monospace',
    fontSize: 13,
    theme: {
      background: '#0d0d0d',
      foreground: '#e0e0e0',
      cursor: '#7ab8f5',
      selectionBackground: '#2a5a9f',
    },
  });

  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(container);
  // defer fit until browser has laid out the container
  requestAnimationFrame(() => { fitAddon.fit(); });
}

function connectSession(name) {
  document.getElementById('no-session-msg').style.display = 'none';
  initTerminal();
  currentSession = name;
  document.getElementById('terminal-header').textContent = `session: ${name}`;
  renderSidebar(currentSessions);

  // Wait for layout + fit before opening WS so cols/rows are real
  requestAnimationFrame(() => {
    fitAddon.fit();
    const { cols, rows } = term;
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/terminal?session=${encodeURIComponent(name)}&cols=${cols}&rows=${rows}`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => { term.focus(); };

    ws.onmessage = (evt) => {
      if (evt.data instanceof ArrayBuffer) {
        term.write(new Uint8Array(evt.data));
      } else {
        term.write(evt.data);
      }
    };

    ws.onclose = () => {
      if (term) term.write('\r\n\x1b[33m[disconnected]\x1b[0m\r\n');
    };

    ws.onerror = () => {
      if (term) term.write('\r\n\x1b[31m[ws error]\x1b[0m\r\n');
    };

    term.onData((data) => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(data);
    });

    resizeObserver = new ResizeObserver(() => {
      fitAddon.fit();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      }
    });
    resizeObserver.observe(document.getElementById('terminal-container'));
  });
}

// --- Session list ---

let currentSessions = [];

function renderSidebar(sessions) {
  currentSessions = sessions;
  const list = document.getElementById('session-list');
  if (sessions.length === 0) {
    list.innerHTML = '<div style="padding:12px;color:#444;font-size:12px;">No sessions</div>';
    return;
  }
  list.innerHTML = sessions.map(name => `
    <div class="session-item ${name === currentSession ? 'active' : ''}" onclick="connectSession('${esc(name)}')">
      <span class="session-name">${esc(name)}</span>
      <button class="kill-btn" title="Kill session" onclick="killSession(event,'${esc(name)}')">&#x2715;</button>
    </div>
  `).join('');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

async function fetchSessions() {
  try {
    const r = await fetch('/api/sessions');
    const sessions = await r.json();
    renderSidebar(sessions);
  } catch {}
}

// Poll every 3s
fetchSessions();
setInterval(fetchSessions, 3000);

// --- Session management ---

async function killSession(evt, name) {
  evt.stopPropagation();
  const r = await fetch(`/api/sessions/${encodeURIComponent(name)}`, { method: 'DELETE' });
  if (r.ok && currentSession === name) {
    currentSession = null;
    document.getElementById('terminal-header').textContent = 'tmux-mirror';
    if (resizeObserver) { resizeObserver.disconnect(); resizeObserver = null; }
    if (term) { try { term.dispose(); } catch {} term = null; }
    if (ws) { try { ws.close(); } catch {} ws = null; }
    document.getElementById('terminal-container').innerHTML = '';
    document.getElementById('no-session-msg').style.display = 'flex';
  }
  fetchSessions();
}

// --- Modal ---

function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-name').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-cmd').value = '';
}

async function createSession() {
  const name = document.getElementById('modal-name').value.trim();
  const command = document.getElementById('modal-cmd').value.trim();
  if (!name) return;

  const r = await fetch('/api/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, command }),
  });

  if (r.ok) {
    closeModal();
    await fetchSessions();
    // Small delay to let tmux session start
    setTimeout(() => connectSession(name), 200);
  } else {
    const err = await r.json();
    alert(err.error || 'Failed to create session');
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) {
    createSession();
  }
});

</script>
</body>
</html>
